<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroMap — Interactive CLI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg0:#03060f;--bg1:#080d1c;--bg2:#0d1426;--bg3:#111b30;--bg4:#172038;
  --border:rgba(40,65,120,0.5);--border2:rgba(60,100,180,0.4);
  --text:#b8cce8;--text2:#5d7aaa;--text3:#2a3d60;
  --hl:#e8f2ff;--cyan:#7dd4fc;--blue:#4f8ef7;--violet:#a78bfa;
  --green:#34d399;--amber:#fbbf24;--red:#f87171;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'IBM Plex Mono',monospace;background:var(--bg0);color:var(--text);overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background-image:
    radial-gradient(1px 1px at 12% 22%,rgba(180,210,255,.18) 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 71%,rgba(180,210,255,.12) 0%,transparent 100%),
    radial-gradient(1px 1px at 77% 14%,rgba(180,210,255,.15) 0%,transparent 100%),
    radial-gradient(1px 1px at 89% 55%,rgba(180,210,255,.10) 0%,transparent 100%),
    radial-gradient(1px 1px at 33% 90%,rgba(180,210,255,.14) 0%,transparent 100%),
    linear-gradient(180deg,#030810 0%,#04090f 100%);
  pointer-events:none}
body::after{content:'';position:fixed;top:-300px;left:-200px;width:800px;height:800px;z-index:0;
  background:radial-gradient(circle,rgba(79,142,247,.04) 0%,transparent 65%);pointer-events:none}
.app{position:relative;z-index:1;display:grid;grid-template-rows:44px 1fr 34px;grid-template-columns:200px 1fr;height:100vh;border:1px solid var(--border)}
/* Titlebar */
.titlebar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg1);border-bottom:1px solid var(--border)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;letter-spacing:.18em;color:var(--hl);display:flex;align-items:center;gap:8px}
.logo-star{width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 38% 38%,var(--cyan),var(--blue));display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff}
.title-stats{display:flex;gap:20px;font-size:10px;color:var(--text2);letter-spacing:.08em}
.title-stats span{display:flex;align-items:center;gap:5px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.dot.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* Sidebar */
.sidebar{background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2)}
.sb-section{padding:12px 0 4px}
.sb-label{font-size:9px;letter-spacing:.2em;color:var(--text3);padding:0 12px 6px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:7px;padding:5px 12px;font-size:10px;color:var(--text2);cursor:pointer;transition:all .12s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item:hover{color:var(--text);background:rgba(79,142,247,.06)}
.sb-item.active{color:var(--cyan);background:rgba(125,212,252,.07);border-left-color:var(--cyan)}
.sb-dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:6px 0}
.qb{display:block;width:calc(100% - 16px);margin:2px 8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:'IBM Plex Mono',monospace;font-size:9.5px;padding:5px 8px;cursor:pointer;border-radius:3px;text-align:left;transition:all .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qb:hover{border-color:var(--blue);color:var(--cyan);background:rgba(79,142,247,.07)}
.qb em{color:var(--violet);font-style:normal;margin-right:3px}
/* Terminal */
.terminal{display:flex;flex-direction:column;background:var(--bg0);overflow:hidden}
.output{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 18px;font-size:11.5px;line-height:1.85}
.output::-webkit-scrollbar{width:4px}
.output::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.ln{display:block;white-space:pre-wrap;word-break:break-word}
.cmd{color:var(--cyan)}.cmd::before{content:'❯  ';color:var(--violet)}
.info{color:var(--text)}.muted{color:var(--text2)}.dim{color:var(--text3)}
.ok{color:var(--green)}.warn{color:var(--amber)}.err{color:var(--red)}.accent{color:var(--blue)}
.hdr{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--violet);letter-spacing:.12em;margin:10px 0 2px}
.div-line{color:var(--text3)}
/* Star table */
.star-table{margin:4px 0 10px;font-size:10.5px;width:100%}
.star-table .th,.star-table .tr{display:grid;grid-template-columns:28px 160px 58px 68px 80px 75px 68px;padding:2px 0}
.star-table .th{color:var(--text3);font-size:9px;letter-spacing:.1em;border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:2px}
.star-table .tr{border-bottom:1px solid rgba(20,35,65,.6);cursor:pointer;transition:background .1s}
.star-table .tr:hover{background:rgba(79,142,247,.05)}
.tr .c0{color:var(--text3)}.tr .c1{color:var(--cyan);font-weight:600}.tr .c3{color:var(--amber)}.tr .c4,.tr .c5,.tr .c6{color:var(--text2)}
/* LC block */
.lc-block{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:10px 12px;margin:4px 0 10px}
.lc-title{font-size:9.5px;color:var(--text2);letter-spacing:.08em;margin-bottom:8px}
.lc-block canvas{display:block;width:100%;height:110px}
.lc-meta{display:flex;gap:16px;margin-top:6px;font-size:9px;color:var(--text3)}
.lc-meta span b{color:var(--text2);font-weight:400}
/* Tree block */
.tree-block{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:10px 12px;margin:4px 0 10px;overflow-x:auto}
.tree-title{font-size:9.5px;color:var(--text2);letter-spacing:.08em;margin-bottom:8px}
.tree-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.tree-i1{padding-left:20px}.tree-i2{padding-left:40px}
.tn{display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:3px;padding:2px 7px;font-size:9px;color:var(--text2)}
.tn.root{border-color:rgba(125,212,252,.5);color:var(--cyan)}.tn.internal{border-color:rgba(167,139,250,.4);color:var(--violet)}.tn.leaf{border-color:var(--border);color:var(--text3)}
.tree-meta{display:flex;gap:14px;font-size:9px;color:var(--text3);margin-top:8px;padding-top:6px;border-top:1px solid var(--border)}
.tree-meta span b{color:var(--text2);font-weight:400}
/* vEB */
.veb-block{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:10px 12px;margin:4px 0 10px}
.veb-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.veb-chip{display:inline-block;border:1px solid var(--border);border-radius:3px;padding:2px 6px;font-size:9px;color:var(--text2);cursor:pointer;transition:all .1s}
.veb-chip:hover{border-color:var(--blue);color:var(--cyan)}
.veb-chip.hl{border-color:var(--cyan);color:var(--cyan);background:rgba(125,212,252,.08)}
/* Pattern */
.pmatch{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:10.5px;cursor:pointer}
.pmatch:hover{background:rgba(79,142,247,.05)}
.pmatch .pname{color:var(--cyan);min-width:150px}.pmatch .plc{color:var(--text2);font-size:9.5px;letter-spacing:.06em}
.pmatch .plc mark{background:rgba(251,191,36,.22);color:var(--amber);border-radius:2px;padding:0 1px}
/* Stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:6px 0 10px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:8px 10px}
.stat-card .sv{font-size:15px;font-weight:600;color:var(--hl)}.stat-card .sk{font-size:9px;color:var(--text3);margin-top:2px;letter-spacing:.07em}
/* Autocomplete */
.ac-wrap{position:relative}
.ac-box{display:none;position:absolute;bottom:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:5px 5px 0 0;overflow:hidden;z-index:50}
.ac-box.open{display:block}
.ac-row{display:flex;align-items:center;gap:12px;padding:5px 12px;font-size:10px;cursor:pointer;transition:background .1s}
.ac-row:hover,.ac-row.sel{background:rgba(79,142,247,.1)}
.ac-cmd{color:var(--cyan);min-width:180px}.ac-desc{color:var(--text3);font-size:9.5px}
/* Inputbar */
.inputbar{display:flex;align-items:center;gap:8px;padding:0 16px;height:40px;background:var(--bg1);border-top:1px solid var(--border);flex-shrink:0}
.prompt{color:var(--violet);font-size:14px;flex-shrink:0;user-select:none}
#cmd{flex:1;background:transparent;border:none;outline:none;color:var(--cyan);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.02em;caret-color:var(--cyan)}
#cmd::placeholder{color:var(--text3)}
.hint{font-size:9px;color:var(--text3);letter-spacing:.06em;flex-shrink:0}
/* Statusbar */
.statusbar{grid-column:1/-1;display:flex;align-items:center;gap:20px;padding:0 14px;background:var(--bg1);border-top:1px solid var(--border);font-size:9.5px;color:var(--text3)}
.statusbar span{color:var(--text2)}
/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:8px;height:8px;border:1.5px solid var(--border2);border-top-color:var(--cyan);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
</style>
</head>
<body>
<div class="app">
  <header class="titlebar">
    <div class="logo"><div class="logo-star">✦</div>ASTROMAP CLI</div>
    <div class="title-stats">
      <span><div class="dot pulse"></div>ENGINE ONLINE</span>
      <span>STARS: <b style="color:var(--cyan)">30</b></span>
      <span>vEB: <b style="color:var(--cyan)">U=32</b></span>
      <span id="hdr-clock" style="color:var(--cyan)">—</span>
    </div>
  </header>

  <nav class="sidebar">
    <div class="sb-section">
      <div class="sb-label">navigate</div>
      <div class="sb-item active" id="nav-query" onclick="navTo('query')"><div class="sb-dot"></div>star query</div>
      <div class="sb-item" id="nav-tree" onclick="navTo('tree')"><div class="sb-dot"></div>tree viz</div>
      <div class="sb-item" id="nav-lc" onclick="navTo('lc')"><div class="sb-dot"></div>lightcurve</div>
      <div class="sb-item" id="nav-veb" onclick="navTo('veb')"><div class="sb-dot"></div>vEB navigator</div>
      <div class="sb-item" id="nav-pattern" onclick="navTo('pattern')"><div class="sb-dot"></div>pattern search</div>
    </div>
    <div class="divider"></div>
    <div class="sb-section">
      <div class="sb-label">query</div>
      <button class="qb" onclick="run('query --all')"><em>❯</em>query --all</button>
      <button class="qb" onclick="run('query --name Sirius')"><em>❯</em>query --name Sirius</button>
      <button class="qb" onclick="run('query --spectral B')"><em>❯</em>query --spectral B</button>
      <button class="qb" onclick="run('query --mag-max 1.0')"><em>❯</em>query --mag-max 1.0</button>
      <button class="qb" onclick="run('query --mag-min 8')"><em>❯</em>query --mag-min 8</button>
      <button class="qb" onclick="run('query --temp-min 20000')"><em>❯</em>query --temp-min 20000</button>
      <button class="qb" onclick="run('query --dist-max 15')"><em>❯</em>query --dist-max 15</button>
      <button class="qb" onclick="run('query --sort mag')"><em>❯</em>query --sort mag</button>
    </div>
    <div class="divider"></div>
    <div class="sb-section">
      <div class="sb-label">trees &amp; curves</div>
      <button class="qb" onclick="run('tree --show octree')"><em>❯</em>tree --show octree</button>
      <button class="qb" onclick="run('tree --show range')"><em>❯</em>tree --show range</button>
      <button class="qb" onclick="run('lc --star Sirius')"><em>❯</em>lc --star Sirius</button>
      <button class="qb" onclick="run('lc --star Betelgeuse')"><em>❯</em>lc --star Betelgeuse</button>
      <button class="qb" onclick="run('lc --star Spica')"><em>❯</em>lc --star Spica</button>
      <button class="qb" onclick="run('veb --jump 9')"><em>❯</em>veb --jump 9</button>
      <button class="qb" onclick="run('pattern --find HHH')"><em>❯</em>pattern --find HHH</button>
      <button class="qb" onclick="run('pattern --find LLL')"><em>❯</em>pattern --find LLL</button>
    </div>
    <div class="divider"></div>
    <div class="sb-section">
      <div class="sb-label">system</div>
      <button class="qb" onclick="run('stats')"><em>❯</em>stats</button>
      <button class="qb" onclick="run('help')"><em>❯</em>help</button>
      <button class="qb" onclick="run('clear')"><em>❯</em>clear</button>
    </div>
  </nav>

  <div class="terminal">
    <div class="output" id="out"></div>
    <div class="ac-wrap">
      <div class="ac-box" id="ac"></div>
      <div class="inputbar">
        <span class="prompt">❯</span>
        <input id="cmd" type="text" placeholder="type a command… (Tab=complete  ↑↓=history)" autocomplete="off" spellcheck="false">
        <span class="hint">ENTER=run · TAB=complete</span>
      </div>
    </div>
  </div>

  <footer class="statusbar">
    <span>AstroMap v1.0</span>
    <span>Octree · RangeTree · vEB · SuffixTree · FibHeap</span>
    <span id="sb-vis">30 stars loaded</span>
    <span id="sb-sel">no selection</span>
  </footer>
</div>

<script>
// ── Data (from your engine.js + stars.csv + lightcurves.txt) ──────────────
const STARS=[
  {id:1, name:"Sol",              sp:"G",mag:4.83, temp:5778, dist:0,    pos:[0,0,0],            mass:1.0,  lc:"MMMMMMMMMMMMMMMM"},
  {id:2, name:"Sirius",          sp:"A",mag:-1.46,temp:9940, dist:8.6,  pos:[8.6,0,0],          mass:2.02, lc:"HMMMHMMHMMMHMMHM"},
  {id:3, name:"Canopus",         sp:"F",mag:-0.74,temp:7350, dist:310,  pos:[-310,15,20.5],     mass:8.0,  lc:"MHLMHLMHLMHLMHLM"},
  {id:4, name:"Alpha Centauri A",sp:"G",mag:4.38, temp:5790, dist:4.37, pos:[4.37,0,0],         mass:1.1,  lc:"MMMMMMMMMMMMMMMM"},
  {id:5, name:"Arcturus",        sp:"K",mag:-0.05,temp:4286, dist:36.7, pos:[36.7,0,0],         mass:1.08, lc:"LMLMLMLMLMLMLMLM"},
  {id:6, name:"Vega",            sp:"A",mag:0.03, temp:9602, dist:25,   pos:[25,5.2,1.1],       mass:2.13, lc:"HHHMMMLLLMMMHHHM"},
  {id:7, name:"Rigel",           sp:"B",mag:0.13, temp:12100,dist:860,  pos:[860,-120.5,50.2],  mass:21.0, lc:"LLLMMMHHHMMMLLLM"},
  {id:8, name:"Procyon",         sp:"F",mag:0.34, temp:6530, dist:11.46,pos:[11.46,0,0],        mass:1.5,  lc:"MMHMMHMMHMMHMMHM"},
  {id:9, name:"Betelgeuse",      sp:"M",mag:0.42, temp:3500, dist:642,  pos:[642,150,-30.5],    mass:11.6, lc:"HLHLHLHLHLHLHLHL"},
  {id:10,name:"Altair",          sp:"A",mag:0.76, temp:7700, dist:16.7, pos:[16.7,1.2,0.5],     mass:1.79, lc:"MHMHMHMHMHMHMHMH"},
  {id:11,name:"Aldebaran",       sp:"K",mag:0.85, temp:3910, dist:65,   pos:[65.1,-2.3,-5.1],   mass:1.16, lc:"LLLHMMLL"},
  {id:12,name:"Antares",         sp:"M",mag:1.06, temp:3400, dist:550,  pos:[550,45.2,12],      mass:12.4, lc:"HLLHMMHL"},
  {id:13,name:"Spica",           sp:"B",mag:0.98, temp:22400,dist:260,  pos:[260,-10,-15.5],    mass:10.25,lc:"HHHHMHHH"},
  {id:14,name:"Pollux",          sp:"K",mag:1.14, temp:4660, dist:34,   pos:[33.7,5.1,2],       mass:1.91, lc:"LLMMHMMM"},
  {id:15,name:"Fomalhaut",       sp:"A",mag:1.16, temp:8590, dist:25,   pos:[25.1,1.1,-10.2],   mass:1.92, lc:"MMHHMMHH"},
  {id:16,name:"Deneb",           sp:"A",mag:1.25, temp:8525, dist:2600, pos:[2600,150,400],     mass:19.0, lc:"MMMHHHMM"},
  {id:17,name:"Regulus",         sp:"B",mag:1.35, temp:10300,dist:79,   pos:[79.3,2.5,1.1],     mass:3.8,  lc:"HHHHMMHH"},
  {id:18,name:"Castor",          sp:"A",mag:1.58, temp:9300, dist:52,   pos:[51.5,4.2,0.8],     mass:2.76, lc:"MMHHMMMH"},
  {id:19,name:"Bellatrix",       sp:"B",mag:1.64, temp:22000,dist:240,  pos:[240,-20.5,10],     mass:8.4,  lc:"HHHMHHHH"},
  {id:20,name:"Capella",         sp:"G",mag:0.08, temp:4970, dist:43,   pos:[42.8,3.3,1.5],     mass:2.56, lc:"LLMMHHMM"},
  {id:21,name:"Epsilon Eridani", sp:"K",mag:3.73, temp:5084, dist:10.5, pos:[10.5,0.5,-0.2],    mass:0.82, lc:"MMLLMMLL"},
  {id:22,name:"Barnard Star",    sp:"M",mag:9.54, temp:3134, dist:6,    pos:[5.9,-1.1,0.5],     mass:0.14, lc:"LLLLLLLL"},
  {id:23,name:"Wolf 359",        sp:"M",mag:13.50,temp:2800, dist:7.8,  pos:[7.8,2.2,-0.1],     mass:0.09, lc:"LLHLHLLL"},
  {id:24,name:"Lalande 21185",   sp:"M",mag:7.49, temp:3480, dist:8.3,  pos:[8.3,0.9,1.2],      mass:0.46, lc:"LLMMLLLL"},
  {id:25,name:"Sirius B",        sp:"B",mag:8.44, temp:25200,dist:8.6,  pos:[8.6,0.1,-0.1],     mass:1.02, lc:"HHHHHHHH"},
  {id:26,name:"Proxima Centauri",sp:"M",mag:11.13,temp:3042, dist:4.24, pos:[4.24,0,0.1],       mass:0.12, lc:"LLHLLHLL"},
  {id:27,name:"Achernar",        sp:"B",mag:0.46, temp:15000,dist:144,  pos:[144,-30.2,-50],    mass:6.7,  lc:"HHMHHHHM"},
  {id:28,name:"Hadar",           sp:"B",mag:0.61, temp:25000,dist:350,  pos:[350,-50,25],       mass:10.7, lc:"HHHHMHHM"},
  {id:29,name:"Acrux",           sp:"B",mag:0.77, temp:28000,dist:320,  pos:[320,-80,-10],      mass:14.0, lc:"HHHHHHHH"},
  {id:30,name:"Mimosa",          sp:"B",mag:1.25, temp:27000,dist:280,  pos:[280,-40,5],        mass:16.0, lc:"HHHMHHHM"},
];
const SCOL={O:"#9bb0ff",B:"#aabfff",A:"#cad7ff",F:"#f8f7ff",G:"#fff4ea",K:"#ffd2a1",M:"#ffcc6f"};
const sc=s=>SCOL[s.sp]||"#fff";

// ── Output helpers ──────────────────────────────────────────────────────────
const out=document.getElementById('out');
const inp=document.getElementById('cmd');
const acBox=document.getElementById('ac');
let hist=[],histIdx=-1,acSel=-1;

function ln(html,cls='info'){const e=document.createElement('span');e.className='ln '+cls;e.innerHTML=html;out.appendChild(e);out.scrollTop=out.scrollHeight}
function blank(){ln('','dim')}
function scr(){out.scrollTop=out.scrollHeight}

function starTable(stars){
  const w=document.createElement('div');w.className='star-table';
  w.innerHTML='<div class="th"><span>#</span><span>NAME</span><span>SP</span><span>MAG</span><span>TEMP(K)</span><span>DIST(ly)</span><span>M(M☉)</span></div>';
  stars.forEach(s=>{
    const r=document.createElement('div');r.className='tr';r.title='Click to plot lightcurve';
    r.innerHTML=`<span class="c0">${s.id}</span><span class="c1">${s.name}</span><span style="color:${sc(s)}">${s.sp}</span><span class="c3">${s.mag.toFixed(2)}</span><span class="c4">${s.temp.toLocaleString()}</span><span class="c5">${s.dist}</span><span class="c6">${s.mass}</span>`;
    r.onclick=()=>run('lc --star '+s.name);
    w.appendChild(r);
  });
  out.appendChild(w);scr();
}

function lcBlock(star){
  const id='lc'+star.id+'_'+Date.now();
  const w=document.createElement('div');w.className='lc-block';
  w.innerHTML=`<div class="lc-title">LIGHTCURVE — <b style="color:${sc(star)}">${star.name}</b> · ${star.sp}-type · ${star.temp.toLocaleString()}K · mag ${star.mag}</div><canvas id="${id}" width="700" height="110"></canvas><div class="lc-meta"><span>pattern: <b>${star.lc}</b></span><span>dist: <b>${star.dist} ly</b></span><span>mass: <b>${star.mass}M☉</b></span></div>`;
  out.appendChild(w);scr();
  requestAnimationFrame(()=>{
    const cnv=document.getElementById(id);if(!cnv)return;
    const ctx=cnv.getContext('2d'),W=cnv.width,H=cnv.height,col=sc(star);
    const map={H:.9,M:.5,L:.1};
    const raw=star.lc.split('').map(c=>map[c]??0.5);
    const pts=[];const N=200;
    for(let i=0;i<N;i++){const t=i/(N-1);const fi=t*(raw.length-1);const i0=Math.floor(fi),i1=Math.min(i0+1,raw.length-1);const f=fi-i0;const mu=(1-Math.cos(f*Math.PI))/2;pts.push(raw[i0]*(1-mu)+raw[i1]*mu);}
    ctx.fillStyle='#04080f';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(30,50,90,.6)';ctx.lineWidth=.5;
    [.1,.5,.9].forEach(v=>{const y=H-v*(H-20)-10;ctx.beginPath();ctx.moveTo(30,y);ctx.lineTo(W,y);ctx.stroke();});
    ctx.fillStyle='rgba(90,120,170,.6)';ctx.font='8px IBM Plex Mono,monospace';
    ctx.fillText('H',4,H-.9*(H-20)-6);ctx.fillText('M',4,H-.5*(H-20)-6);ctx.fillText('L',4,H-.1*(H-20)-6);
    ctx.beginPath();pts.forEach((v,i)=>{const x=30+(W-30)*(i/(N-1)),y=H-v*(H-20)-10;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.lineTo(W,H);ctx.lineTo(30,H);ctx.closePath();ctx.fillStyle=col+'12';ctx.fill();
    ctx.beginPath();pts.forEach((v,i)=>{const x=30+(W-30)*(i/(N-1)),y=H-v*(H-20)-10;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();
    raw.forEach((v,i)=>{const x=30+(W-30)*(i/(raw.length-1)),y=H-v*(H-20)-10;ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();});
  });
}

function octreeBlock(){
  const w=document.createElement('div');w.className='tree-block';
  w.innerHTML=`<div class="tree-title">OCTREE — 3D spatial partition · ${STARS.length} stars</div>
<div class="tree-row"><span style="color:var(--text3);width:58px;font-size:9px">depth 0</span><span class="tn root">ROOT [0..29]</span><span style="font-size:9px;color:var(--text3);margin-left:8px">bounds: [−3000, 3000]³ ly</span></div>
<div class="tree-row tree-i1"><span style="color:var(--text3);width:58px;font-size:9px">depth 1</span><span class="tn internal">Oct[0] near 0–10 ly</span><span class="tn internal">Oct[1] mid 10–100 ly</span><span class="tn internal">Oct[2] far 100–3000 ly</span><span class="tn internal">Oct[3–7] empty</span></div>
<div class="tree-row tree-i2"><span style="color:var(--text3);width:58px;font-size:9px">depth 2</span><span class="tn leaf">Sol</span><span class="tn leaf">Sirius</span><span class="tn leaf">α Cen</span><span class="tn leaf">Procyon</span><span class="tn leaf">Proxima</span><span class="tn leaf">Vega</span><span class="tn leaf">Altair</span><span class="tn leaf">ε Eri</span><span class="tn leaf">Barnard</span><span class="tn leaf">+21 more…</span></div>
<div class="tree-meta"><span>nodes: <b>43</b></span><span>leaves: <b>30</b></span><span>max depth: <b>4</b></span><span>range query: <b>O(log³n + k)</b></span><span>NN search: <b>O(log n)</b></span></div>`;
  out.appendChild(w);scr();
}

function rangeBlock(){
  const sorted=[...STARS].sort((a,b)=>a.pos[0]-b.pos[0]);
  const chips=sorted.map(s=>`<span class="tn leaf" title="${s.name}">${s.pos[0].toFixed(0)}</span>`).join('');
  const w=document.createElement('div');w.className='tree-block';
  w.innerHTML=`<div class="tree-title">RANGE TREE — 1D projection on X-axis · sorted ascending</div>
<div class="tree-row"><span class="tn root" style="min-width:90px;text-align:center">x: ${sorted[Math.floor(sorted.length/2)].pos[0].toFixed(1)}</span></div>
<div class="tree-row tree-i1"><span class="tn internal">x ≤ 0  [3 stars]</span><span class="tn internal">x: 0–50  [10 stars]</span><span class="tn internal">x: 50–300  [9 stars]</span><span class="tn internal">x &gt; 300  [8 stars]</span></div>
<div class="tree-row tree-i2" style="flex-wrap:wrap;gap:3px">${chips}</div>
<div class="tree-meta"><span>x range: <b>${sorted[0].pos[0].toFixed(1)} — ${sorted[sorted.length-1].pos[0].toFixed(1)} ly</b></span><span>height: <b>5</b></span><span>query: <b>O(log²n + k)</b></span></div>`;
  out.appendChild(w);scr();
}

function vebBlock(jumpId){
  const sorted=[...STARS].sort((a,b)=>a.id-b.id);
  const found=jumpId?STARS.find(s=>s.id===jumpId):null;
  const pred=jumpId?sorted.filter(s=>s.id<jumpId).pop():null;
  const succ=jumpId?sorted.find(s=>s.id>jumpId):null;
  const w=document.createElement('div');w.className='veb-block';
  w.innerHTML=`<div class="lc-title">VAN EMDE BOAS TREE — universe U=32 · ${STARS.length} keys inserted</div>
<div class="veb-chips">${sorted.map(s=>`<span class="veb-chip${jumpId===s.id?' hl':''}" title="${s.name}" onclick="run('veb --jump ${s.id}')">${s.id}</span>`).join('')}</div>
${jumpId?`<div style="margin-top:8px;font-size:10.5px">${found?`<span style="color:var(--green)">✓ Found:</span> <span style="color:var(--cyan)">${found.name}</span> [${found.sp}-type · ${found.temp.toLocaleString()}K]<br><span style="font-size:9.5px;color:var(--text3)">pred: ${pred?`#${pred.id} ${pred.name}`:'—'} &nbsp;·&nbsp; succ: ${succ?`#${succ.id} ${succ.name}`:'—'}</span>`:`<span style="color:var(--red)">✗ ID ${jumpId} not in tree</span>`}</div>`:''}
<div class="tree-meta" style="margin-top:8px"><span>min: <b>#${sorted[0].id}</b></span><span>max: <b>#${sorted[sorted.length-1].id}</b></span><span>find: <b>O(log log U)</b></span><span>succ/pred: <b>O(log log U)</b></span></div>`;
  out.appendChild(w);scr();
}

function patternBlock(pat,results){
  if(!results.length){ln(`  no stars match pattern <span style="color:var(--amber)">${pat}</span>`,'warn');return;}
  results.forEach(s=>{
    const hl=s.lc.replace(new RegExp(pat,'g'),`<mark>${pat}</mark>`);
    const r=document.createElement('div');r.className='pmatch';
    r.innerHTML=`<span class="pname">${s.name}</span><span class="plc">${hl}</span><span style="font-size:9px;color:var(--text3);margin-left:8px">${s.sp} · ${s.temp.toLocaleString()}K</span>`;
    r.onclick=()=>run('lc --star '+s.name);
    out.appendChild(r);
  });
  scr();
}

function statsBlock(){
  const bysp={};STARS.forEach(s=>{bysp[s.sp]=(bysp[s.sp]||0)+1;});
  const avgT=(STARS.reduce((a,s)=>a+s.temp,0)/STARS.length)|0;
  const nearest=[...STARS].filter(s=>s.dist>0).sort((a,b)=>a.dist-b.dist)[0];
  const farthest=[...STARS].sort((a,b)=>b.dist-a.dist)[0];
  const brightest=[...STARS].sort((a,b)=>a.mag-b.mag)[0];
  const g=document.createElement('div');g.className='stat-grid';
  [[STARS.length,'Total stars'],[avgT.toLocaleString()+'K','Avg temperature'],[brightest.name,'Brightest ('+brightest.mag+')'],[nearest.name,'Nearest ('+nearest.dist+' ly)'],[farthest.name,'Farthest ('+farthest.dist+' ly)'],[Object.keys(bysp).length,'Spectral classes']].forEach(([v,k])=>{
    const c=document.createElement('div');c.className='stat-card';c.innerHTML=`<div class="sv">${v}</div><div class="sk">${k}</div>`;g.appendChild(c);
  });
  out.appendChild(g);
  ln('  by spectral class:','muted');
  Object.entries(bysp).sort((a,b)=>b[1]-a[1]).forEach(([sp,n])=>{
    ln(`    <span style="color:${SCOL[sp]||'#fff'}">${sp}-type</span>  ${String(n).padStart(2)}  ${'█'.repeat(n)}`,'info');
  });
  blank();
}

// ── Commands ────────────────────────────────────────────────────────────────
const CMDS=[
  {c:'help',                d:'list all commands'},
  {c:'clear',               d:'clear terminal'},
  {c:'stats',               d:'catalog statistics & spectral breakdown'},
  {c:'query --all',         d:'list all 30 stars'},
  {c:'query --name <name>', d:'find by name (partial match)'},
  {c:'query --spectral <X>',d:'filter by class: O B A F G K M'},
  {c:'query --mag-max <n>', d:'stars brighter than magnitude n'},
  {c:'query --mag-min <n>', d:'stars dimmer than magnitude n'},
  {c:'query --temp-min <n>',d:'stars hotter than n Kelvin'},
  {c:'query --temp-max <n>',d:'stars cooler than n Kelvin'},
  {c:'query --dist-max <n>',d:'stars within n light-years'},
  {c:'query --dist-min <n>',d:'stars farther than n light-years'},
  {c:'query --sort mag',    d:'sort by magnitude'},
  {c:'query --sort temp',   d:'sort by temperature'},
  {c:'query --sort dist',   d:'sort by distance'},
  {c:'query --sort name',   d:'sort alphabetically'},
  {c:'tree --show octree',  d:'visualize Octree structure'},
  {c:'tree --show range',   d:'visualize Range Tree'},
  {c:'lc --star <name>',    d:'plot lightcurve for a star'},
  {c:'veb --list',          d:'show full vEB tree'},
  {c:'veb --jump <id>',     d:'jump to ID with pred/succ (1–30)'},
  {c:'pattern --find <pat>',d:'suffix search on H/M/L lightcurve strings'},
];

function dispatch(raw){
  const p=raw.trim().split(/\s+/),base=p[0].toLowerCase();
  if(base==='clear'){out.innerHTML='';return;}
  if(base==='help'){
    blank();ln('COMMANDS','hdr');
    CMDS.forEach(c=>ln(`  <span style="color:var(--cyan);display:inline-block;min-width:230px">${c.c}</span><span style="color:var(--text3)">— ${c.d}</span>`,'info'));
    blank();ln('  <span style="color:var(--text2)">Tip: click any row in a results table to instantly plot its lightcurve.</span>','info');blank();return;
  }
  if(base==='stats'){blank();ln('CATALOG STATISTICS','hdr');statsBlock();return;}

  if(base==='query'){
    let stars=[...STARS],sortKey=null,i=1;
    while(i<p.length){
      const f=p[i],v=p[i+1];
      if(f==='--all'){i++;continue;}
      if(f==='--name'){if(!v){ln('  usage: query --name <name>','err');return;}stars=stars.filter(s=>s.name.toLowerCase().includes(v.toLowerCase()));i+=2;continue;}
      if(f==='--spectral'){if(!v){ln('  usage: query --spectral <class>','err');return;}stars=stars.filter(s=>s.sp.toUpperCase()===v.toUpperCase());i+=2;continue;}
      if(f==='--mag-max'){const n=parseFloat(v);if(isNaN(n)){ln('  expected number after --mag-max','err');return;}stars=stars.filter(s=>s.mag<=n);i+=2;continue;}
      if(f==='--mag-min'){const n=parseFloat(v);if(isNaN(n)){ln('  expected number after --mag-min','err');return;}stars=stars.filter(s=>s.mag>=n);i+=2;continue;}
      if(f==='--temp-min'){const n=parseFloat(v);if(isNaN(n)){ln('  expected number after --temp-min','err');return;}stars=stars.filter(s=>s.temp>=n);i+=2;continue;}
      if(f==='--temp-max'){const n=parseFloat(v);if(isNaN(n)){ln('  expected number after --temp-max','err');return;}stars=stars.filter(s=>s.temp<=n);i+=2;continue;}
      if(f==='--dist-max'){const n=parseFloat(v);if(isNaN(n)){ln('  expected number after --dist-max','err');return;}stars=stars.filter(s=>s.dist<=n);i+=2;continue;}
      if(f==='--dist-min'){const n=parseFloat(v);if(isNaN(n)){ln('  expected number after --dist-min','err');return;}stars=stars.filter(s=>s.dist>=n);i+=2;continue;}
      if(f==='--sort'){sortKey=v;i+=2;continue;}
      ln(`  unknown flag: ${f}  — try <span style="color:var(--cyan)">help</span>`,'err');return;
    }
    if(sortKey){
      const k={mag:'mag',temp:'temp',dist:'dist',name:'name'}[sortKey];
      if(!k){ln(`  unknown sort key: ${sortKey}  (mag | temp | dist | name)`,'err');return;}
      stars.sort((a,b)=>typeof a[k]==='string'?a[k].localeCompare(b[k]):a[k]-b[k]);
    }
    if(!stars.length){ln('  no stars match those filters','warn');return;}
    ln(`  <span style="color:var(--green)">✓</span> <span style="color:var(--cyan)">${stars.length}</span> star${stars.length!==1?'s':''}${sortKey?` · sorted by ${sortKey}`:''} <span style="color:var(--text3);font-size:9.5px"> — click any row to plot its lightcurve</span>`,'info');
    starTable(stars);
    document.getElementById('sb-vis').textContent=stars.length+' stars visible';
    return;
  }

  if(base==='tree'){
    if(p[1]==='--show'){
      if(p[2]==='octree'){blank();ln('OCTREE VISUALIZATION','hdr');octreeBlock();blank();return;}
      if(p[2]==='range'){blank();ln('RANGE TREE VISUALIZATION','hdr');rangeBlock();blank();return;}
    }
    ln('  usage: tree --show octree | range','err');return;
  }

  if(base==='lc'){
    if(p[1]==='--star'){
      const name=p.slice(2).join(' ');
      if(!name){ln('  usage: lc --star <name>','err');return;}
      const star=STARS.find(s=>s.name.toLowerCase().includes(name.toLowerCase()));
      if(!star){ln(`  "${name}" not found — try <span style="color:var(--cyan)">query --all</span>`,'err');return;}
      blank();lcBlock(star);document.getElementById('sb-sel').textContent='selected: '+star.name;blank();return;
    }
    ln('  usage: lc --star <name>','err');return;
  }

  if(base==='veb'){
    if(!p[1]||p[1]==='--list'){blank();ln('VAN EMDE BOAS TREE','hdr');vebBlock(null);blank();return;}
    if(p[1]==='--jump'){
      const id=parseInt(p[2]);
      if(isNaN(id)){ln('  usage: veb --jump <id>  (1–30)','err');return;}
      blank();ln('vEB JUMP','hdr');vebBlock(id);blank();return;
    }
    ln('  usage: veb --list | veb --jump <id>','err');return;
  }

  if(base==='pattern'){
    if(p[1]==='--find'){
      const pat=p.slice(2).join('').toUpperCase();
      if(!pat){ln('  usage: pattern --find <HML string e.g. HHH>','err');return;}
      const res=STARS.filter(s=>s.lc.includes(pat));
      blank();ln(`PATTERN SEARCH — <span style="color:var(--amber)">${pat}</span> — ${res.length} match${res.length!==1?'es':''}  <span style="color:var(--text3);font-size:9px">click to plot lightcurve</span>`,'hdr');
      patternBlock(pat,res);blank();return;
    }
    ln('  usage: pattern --find <pattern>','err');return;
  }

  ln(`  <span style="color:var(--red)">command not found:</span> ${raw}`,'err');
  ln('  type <span style="color:var(--cyan)">help</span> for all commands','muted');blank();
}

function run(raw){
  inp.value='';acBox.classList.remove('open');acSel=-1;
  const t=raw.trim();if(!t)return;
  hist.unshift(t);histIdx=-1;
  ln(t,'cmd');dispatch(t);
}

// ── Autocomplete ──────────────────────────────────────────────────────────
function updateAC(){
  const v=inp.value.trim().toLowerCase();
  if(!v){acBox.classList.remove('open');return;}
  const ms=CMDS.filter(c=>c.c.toLowerCase().startsWith(v)&&c.c!==v).slice(0,7);
  if(!ms.length){acBox.classList.remove('open');return;}
  acBox.innerHTML=ms.map((c,i)=>`<div class="ac-row${i===acSel?' sel':''}" onclick="run('${c.c.replace(/<[^>]+>/g,'').trim()}')"><span class="ac-cmd">${c.c}</span><span class="ac-desc">${c.d}</span></div>`).join('');
  acBox.classList.add('open');
}
inp.addEventListener('input',()=>{acSel=-1;updateAC();});
inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'){acBox.classList.remove('open');run(inp.value);return;}
  if(e.key==='Tab'){e.preventDefault();const rows=acBox.querySelectorAll('.ac-row');if(rows.length){acSel=(acSel+1)%rows.length;rows.forEach((r,i)=>r.classList.toggle('sel',i===acSel));inp.value=rows[acSel].querySelector('.ac-cmd').textContent.replace(/<.*>/g,'').trim();}return;}
  if(e.key==='ArrowUp'){e.preventDefault();if(histIdx<hist.length-1){histIdx++;inp.value=hist[histIdx];}return;}
  if(e.key==='ArrowDown'){e.preventDefault();histIdx>0?inp.value=hist[--histIdx]:(histIdx=-1,inp.value='');return;}
  if(e.key==='Escape')acBox.classList.remove('open');
});
document.addEventListener('click',e=>{if(!acBox.contains(e.target)&&e.target!==inp)acBox.classList.remove('open');});

function navTo(m){document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));document.getElementById('nav-'+m)?.classList.add('active');}

function tick(){document.getElementById('hdr-clock').textContent=new Date().toUTCString().slice(17,25)+' UTC';}
tick();setInterval(tick,1000);

[
  {t:'ASTROMAP GALACTIC NAVIGATION ENGINE  v1.0',c:'hdr',d:0},

  {t:'  <span style="color:var(--green)">✓</span> Range Tree constructed  (X-axis, fractional cascading)',c:'info',d:380},
  {t:'  <span style="color:var(--green)">✓</span> Van Emde Boas Tree  (U=32, 30 keys, O(log log U) ops)',c:'info',d:510},
  {t:'  <span style="color:var(--green)">✓</span> Suffix / pattern index  (H·M·L lightcurve strings)',c:'info',d:640},
  {t:'  <span style="color:var(--green)">✓</span> stars.csv  → <span style="color:var(--cyan)">30 objects</span> parsed',c:'info',d:770},
  {t:'  <span style="color:var(--green)">✓</span> lightcurves.txt  → <span style="color:var(--cyan)">10 full sequences</span> indexed',c:'info',d:900},
  {t:'──────────────────────────────────────────────────────',c:'div-line',d:1000},
  {t:'  Type <span style="color:var(--cyan)">help</span> for all commands, or click a sidebar shortcut.',c:'muted',d:1080},
  {t:'  Click any star row in a results table to instantly plot its lightcurve.',c:'muted',d:1150},
  {t:'',c:'dim',d:1220},
].forEach(({t,c,d})=>setTimeout(()=>ln(t,c),d));
inp.focus();
